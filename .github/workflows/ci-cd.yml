name: Spring Boot CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Java 21 JDK
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build and run JUnit tests with Maven
      run: mvn clean test -Dspring.profiles.active=test

    - name: Package Application JAR
      run: mvn package -DskipTests -B

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub (Demo Mock Step)
      if: github.ref == 'refs/heads/main'
      run: echo "Logging in to Docker Hub..."
      # uses: docker/login-action@v2
      # with:
      #   username: ${{ secrets.DOCKERHUB_USERNAME }}
      #   password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image (Demo Mock Step)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Building docker image..."
        echo "Pushing image to registry..."
