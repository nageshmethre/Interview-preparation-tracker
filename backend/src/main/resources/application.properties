# Spring Boot Application Configurations

# Web Server Port
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:interview_tracker}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=never

# File Upload Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
# 256-bit HS256 Secret Key (in Base64 or Hex)
jwt.secret=9a4f2c8d3b7a1e5f9c8d7b6a5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d
# 1 Day Expiration (86400000 milliseconds)
jwt.expiration=86400000

# Logging Configurations
logging.level.root=INFO
logging.level.com.interviewtracker=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
