<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrepSpace - Premium Interview Preparation Tracker SaaS</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Custom Styling -->
  <link rel="stylesheet" href="assets/css/index.css?v=2.0.3">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Toast Alert Container -->
  <div id="toast-container"></div>

  <!-- Main View Mount -->
  <div id="app-root">
    <!-- View will be injected dynamically by app.js:
         - Public Landing Page
         - Auth Login/Register/Forgot Pass
         - Main Workspace Dashboard (Sidebar + Page Content) -->
    
    <!-- Initial Loading Spinner -->
    <div class="d-flex align-items-center justify-content-center min-vh-100">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-muted">Initializing PrepSpace Workspace...</p>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Application Core Scripts -->
  <script src="assets/js/components.js?v=2.0.3"></script>
  <script src="assets/js/app.js?v=2.0.3"></script>
</body>
</html>
